<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato - Jornal da Tecnologia</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <nav class="navbar">
      <!-- Botão do menu hambúrguer -->
      <button id="menuToggle">☰</button>

      <!-- Links do menu -->
      <div id="menuLinks">
        <a href="index.html">Início</a>
        <a href="html.html">HTML</a>
        <a href="css.html">CSS</a>
        <a href="js.html">JavaScript</a>
        <a href="contato.html">Contato</a>
        <button id="btnTema">Alterar Tema</button>
      </div>
    </nav>
  </header>

  <main class="artigo">
    <h1>Entre em Contato</h1>
    <img src="imagens/jornal.png" alt="Imagem de contato" width="200">

    <form id="formContato">
      <fieldset>
        <legend>Envie sua mensagem</legend>

        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" placeholder="Seu nome" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Seu email" required>

        <label for="mensagem">Mensagem:</label>
        <textarea id="mensagem" name="mensagem" placeholder="Escreva sua mensagem" required></textarea>

        <button type="submit">Enviar</button>
      </fieldset>
    </form>
  </main>

  <footer>
    <p>&copy; 2026 Jornal da Tecnologia. Todos os direitos reservados.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
